
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-flask-dashboard
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: api-flask-dashboard
  template:
    metadata:
      labels:
        app: api-flask-dashboard
    spec:
      containers:
        - name: flask-app
          image: virtapp/api-flask-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
---

apiVersion: v1
kind: Service
metadata:
  name: api-flask-dashboard
spec:
  selector:
    app: api-flask-dashboard
  ports:
    - port: 80
      targetPort: 5000

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-route-flask-dashboard
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  tls:
    - hosts:
        - __HOST__
      secretName: flask-dashboard-tls
  rules:
    - host: __HOST__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-flask-dashboard
                port:
                  number: 80
