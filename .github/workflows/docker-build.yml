name: Build & Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "deploy/**"
    #  - "app/**"

jobs:
  docker:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        cluster:
          - name: dev
            kubeconfig: KUBE_CONFIG_DEV
            namespace: default
          - name: prod
            kubeconfig: KUBE_CONFIG_PROD
            namespace: default

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/api-flask-dashboard:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/api-flask-dashboard:${{ github.sha }}

      # 🔽 Per-cluster deployment starts here
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets[matrix.cluster.kubeconfig] }}" > $HOME/.kube/config

      - name: Show cluster (important!)
        run: |
          kubectl config current-context
          kubectl get nodes

      - name: Render manifest
        run: |
          HOST=app-${{ matrix.cluster.name }}.appflex.io
          sed "s|__HOST__|$HOST|g" deploy/flask-dashboard.yaml > deploy/rendered.yaml
    
      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f deploy/rendered.yaml -n ${{ matrix.cluster.namespace }}

      - name: Update deployment image and rollout
        run: |
          set -e
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/api-flask-dashboard:${{ github.sha }}

          kubectl set image deployment/api-flask-dashboard flask-app=$IMAGE -n ${{ matrix.cluster.namespace }}
          kubectl rollout restart deployment/api-flask-dashboard -n ${{ matrix.cluster.namespace }}
          kubectl rollout status deployment/api-flask-dashboard -n ${{ matrix.cluster.namespace }} --timeout=180s

      - name: Verify deployment
        run: |
          kubectl get deployment api-flask-dashboard -n ${{ matrix.cluster.namespace }}
          kubectl get pods -l app=api-flask-dashboard -n ${{ matrix.cluster.namespace }}

