apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-flask-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-flask-dashboard
  template:
    metadata:
      labels:
        app: api-flask-dashboard
    spec:
      containers:
        - name: flask-dashboard
          image: virtapp/api-flask-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
---

apiVersion: v1
kind: Service
metadata:
  name: api-flask-dashboard
spec:
  selector:
    app: api-flask-dashboard
  ports:
    - port: 80
      targetPort: 5000
